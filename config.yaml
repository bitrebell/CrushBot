bot:
  token: "7796407829:AAEtpsGuITAgrxBCVF3Xn0D_HyjzrNWN2dQ"
  name: "CrushBot"

admins:
  - 6771364361  # Replace with actual admin user IDs

database:
  uri: "mongodb://localhost:27017/"
  name: "crushbot_db"
  # Performance settings
  max_pool_size: 50
  connection_timeout_ms: 5000
  server_selection_timeout_ms: 5000

# Default messages
messages:
  welcome: "Welcome {user} to {group}! Please read the rules and enjoy your stay."
  ban: "{user} has been banned from the group. Reason: {reason}"
  unban: "{user} has been unbanned from the group."
  restrict: "{user} has been restricted from {actions} for {duration}."
  
# Logging settings
logging:
  level: "INFO"
  file: "bot.log"
  max_logs: 100  # Number of logs to keep in database

# Feature toggles
features:
  welcome_message: true
  ban_logging: true
  action_logging: true

# Performance settings
performance:
  cache_ttl: 600  # Cache expiration in seconds
  admin_cache_ttl: 300  # Admin status cache expiration
  worker_threads: 8  # Number of worker threads
  connection_pool_size: 16  # API connection pool size
  read_timeout: 10  # API read timeout 